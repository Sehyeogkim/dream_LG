<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>드림정보시스템 - LG 렌탈샵</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-lg">LG</span>
        <div class="logo-text">
          <span class="company-name">드림정보시스템</span>
          <span class="company-sub">LG 렌탈샵</span>
        </div>
      </div>
      <div class="header-contact">
        <span>상담 문의</span>
        <a href="tel:010-0000-0000" class="phone">010-0000-0000</a>
      </div>
    </div>
  </header>

  <!-- 메인 레이아웃 -->
  <div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <h2 class="sidebar-title">제품 카테고리</h2>
      <nav>
        <ul class="category-list" id="categoryList">
          <li class="category-item active" data-category="전체">전체</li>
          <li class="category-item" data-category="컴퓨터">컴퓨터</li>
          <li class="category-item" data-category="노트북">노트북</li>
          <li class="category-item" data-category="청소기">청소기</li>
          <li class="category-item" data-category="세탁기">세탁기</li>
          <li class="category-item" data-category="TV">TV</li>
          <li class="category-item" data-category="냉장고">냉장고</li>
          <li class="category-item" data-category="에어컨">에어컨</li>
          <li class="category-item" data-category="기타">기타</li>
        </ul>
      </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
      <div class="content-header">
        <h1 class="category-title" id="categoryTitle">전체 제품</h1>
        <span class="product-count" id="productCount"></span>
      </div>
      <div class="product-grid" id="productGrid">
        <!-- JS로 렌더링 -->
      </div>
    </main>

  </div>

  <!-- 푸터 -->
  <footer class="site-footer">
    <p>드림정보시스템 | LG전자 공식 렌탈 서비스 | 문의: 010-0000-0000</p>
  </footer>

  <script src="data/products.js"></script>
  <script src="script.js"></script>
</body>
</html>
